<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI学习助手 - 香港科技大学（广州）-编程猫联合实验室</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #1a0533 0%, #0d0d2b 50%, #1a1a3e 100%);
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #e2e8f0;
  }

  /* Header */
  .ai-header {
    background: rgba(124,58,237,0.15);
    border-bottom: 1px solid rgba(124,58,237,0.3);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .ai-header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .ai-avatar-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #7C3AED, #EC4899);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }
  .ai-title { font-size: 1.15rem; font-weight: 700; color: white; }
  .ai-subtitle { font-size: 0.78rem; color: #a78bfa; }
  .ai-header-right { display: flex; align-items: center; gap: 0.5rem; }
  .source-badge {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(124,58,237,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }

  /* Container */
  .ai-container {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 70px);
  }

  /* Mode Tabs */
  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .mode-tab {
    padding: 0.4rem 1rem;
    border-radius: 20px;
    border: 1.5px solid rgba(124,58,237,0.4);
    background: rgba(124,58,237,0.1);
    color: #a78bfa;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab:hover { border-color: #7C3AED; color: white; }
  .mode-tab.active {
    background: linear-gradient(135deg, #7C3AED, #EC4899);
    border-color: transparent;
    color: white;
  }

  /* Chat Area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 2px; }

  .msg-wrap { display: flex; gap: 0.75rem; max-width: 100%; }
  .msg-wrap.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .msg-avatar.ai { background: linear-gradient(135deg, #7C3AED, #EC4899); }
  .msg-avatar.user { background: linear-gradient(135deg, #10B981, #059669); }
  .msg-avatar.thinking { background: rgba(124,58,237,0.3); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .msg-content {
    max-width: 78%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    border-top-left-radius: 4px;
    padding: 0.75rem 1rem;
    font-size: 0.92rem;
    line-height: 1.7;
    color: #e2e8f0;
  }
  .msg-wrap.user .msg-content {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.3);
    border-top-left-radius: 16px;
    border-top-right-radius: 4px;
    text-align: right;
  }
  .msg-content p { margin-bottom: 0.5rem; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    background: rgba(124,58,237,0.2);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Courier New', monospace;
    font-size: 0.85em;
    color: #c4b5fd;
  }
  .msg-content pre {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 0.75rem;
    overflow-x: auto;
    margin: 0.5rem 0;
    font-size: 0.82rem;
  }
  .msg-content pre code { background: none; padding: 0; }
  .msg-time { font-size: 0.7rem; color: #64748b; margin-top: 3px; text-align: right; }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 0 1rem;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: #7C3AED;
    border-radius: 50%;
    animation: typing-bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  /* Topic Suggestions */
  .topics-section {
    padding: 0.75rem 0;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .topics-label { font-size: 0.78rem; color: #64748b; margin-bottom: 0.5rem; }
  .topics-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .topic-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(124,58,237,0.3);
    background: rgba(124,58,237,0.08);
    color: #a78bfa;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .topic-btn:hover {
    background: rgba(124,58,237,0.25);
    color: white;
    border-color: #7C3AED;
  }

  /* Code Review Panel */
  .code-panel { display: none; }
  .code-panel.active { display: block; }
  .code-input {
    width: 100%;
    min-height: 140px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 0.75rem;
    color: #e2e8f0;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    resize: vertical;
    margin-bottom: 0.75rem;
  }
  .code-input:focus { outline: none; border-color: #7C3AED; }
  .code-input::placeholder { color: #4b5563; }

  /* Input Area */
  .input-area {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .chat-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(124,58,237,0.3);
    border-radius: 14px;
    padding: 0.7rem 1rem;
    color: white;
    font-size: 0.92rem;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  .chat-input:focus { outline: none; border-color: #7C3AED; }
  .chat-input::placeholder { color: #64748b; }
  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #7C3AED, #EC4899);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Source indicator */
  .source-tag {
    font-size: 0.68rem;
    color: #64748b;
    margin-left: 0.5rem;
  }

  /* Guide card */
  .guide-card {
    background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.1));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px;
    padding: 1rem;
    margin: 0.5rem 0;
    font-size: 0.88rem;
  }
  .guide-card-title { font-weight: 700; color: #c4b5fd; margin-bottom: 0.5rem; }

  /* Learning guide section */
  .guide-select-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
  }
  .guide-select {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 8px;
    color: white;
    padding: 0.4rem 0.75rem;
    font-size: 0.85rem;
  }
  .guide-select option { background: #1a1a2e; }
</style>
</head>
<body>

<!-- Header -->
<div class="ai-header">
  <div class="ai-header-left">
    <div class="ai-avatar-icon">🤖</div>
    <div>
      <div class="ai-title">AI学习助手</div>
      <div class="ai-subtitle" id="aiSubtitle">本地规则引擎 · 即问即答</div>
    </div>
  </div>
  <div class="ai-header-right">
    <span class="source-badge" id="sourceBadge">local</span>
  </div>
</div>

<!-- Main Container -->
<div class="ai-container">
  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="qa" onclick="switchMode('qa')">
      💬 智能问答
    </button>
    <button class="mode-tab" data-mode="code_review" onclick="switchMode('code_review')">
      🔍 代码审查
    </button>
    <button class="mode-tab" data-mode="guide" onclick="switchMode('guide')">
      📚 学习引导
    </button>
  </div>

  <!-- Chat Messages -->
  <div class="chat-area" id="chatArea">
    <!-- Welcome message -->
    <div class="msg-wrap" id="welcomeMsg">
      <div class="msg-avatar ai">🤖</div>
      <div>
        <div class="msg-content">
          <p>你好呀！我是港科大（广州）× 编程猫 AI学习助手 🤖</p>
          <p>我可以帮你解答关于<strong>表情识别</strong>、<strong>声音情绪</strong>、<strong>时序预测</strong>等各种问题！</p>
          <p>试试问我：</p>
          <p>• 什么是CNN？<br>• 声音情绪是怎么判断的？<br>• 如何提高预测准确率？</p>
          <p style="color:#a78bfa;font-size:0.82rem">💡 也支持代码审查和学习引导模式，点击上方标签切换~</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Topic Suggestions -->
  <div class="topics-section" id="topicsSection">
    <div class="topics-label">💡 试试这样问：</div>
    <div class="topics-grid" id="topicsGrid"></div>
  </div>

  <!-- Code Review Panel -->
  <div class="code-panel" id="codePanel">
    <textarea class="code-input" id="codeInput"
              placeholder="粘贴你想审查的代码在这里...（Python）"></textarea>
    <button class="btn-fun btn-purple" onclick="submitCodeReview()">🔍 开始审查</button>
  </div>

  <!-- Input Area -->
  <div class="input-area" id="inputArea">
    <textarea class="chat-input" id="chatInput"
              placeholder="输入你的问题... (Enter 发送，Shift+Enter 换行)"
              rows="1"
              onkeydown="handleKeydown(event)"
              oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let currentMode = 'qa';
let chatHistory = [];
let isLoading = false;
let currentGuideCourse = null;
let currentGuideLesson = null;

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  // 获取 AI 模式信息
  try {
    const resp = await fetch('/ai/mode');
    const data = await resp.json();
    if (data.success && data.llm_available) {
      document.getElementById('aiSubtitle').textContent =
        `${data.model || 'LLM'} · 已连接`;
      document.getElementById('sourceBadge').textContent = 'llm';
    } else {
      document.getElementById('aiSubtitle').textContent = '本地规则引擎 · 即问即答';
      document.getElementById('sourceBadge').textContent = 'local';
    }
  } catch(e) {
    document.getElementById('aiSubtitle').textContent = '本地规则引擎 · 即问即答';
  }

  // 加载默认话题
  loadTopics('default');

  // 如果有登录用户，加载个人化引导
  try {
    const resp = await fetch('/ai/guide?course=emotion&lesson=1');
    const data = await resp.json();
    if (data.success && data.guide) {
      // 不自动显示，等待用户点击
    }
  } catch(e) {}
})();

// ── Mode Switch ───────────────────────────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[data-mode="${mode}"]`).classList.add('active');

  const codePanel = document.getElementById('codePanel');
  const topicsSection = document.getElementById('topicsSection');
  const chatInput = document.getElementById('chatInput');
  const welcomeMsg = document.getElementById('welcomeMsg');

  if (mode === 'code_review') {
    codePanel.classList.add('active');
    topicsSection.style.display = 'none';
    chatInput.placeholder = '代码审查模式：请在上方粘贴代码后点击"开始审查"...';
    if (welcomeMsg) welcomeMsg.style.display = 'none';
  } else if (mode === 'guide') {
    codePanel.classList.remove('active');
    topicsSection.style.display = 'none';
    chatInput.placeholder = '学习引导模式：输入课程和课时，我来给你建议！';
    if (welcomeMsg) welcomeMsg.style.display = 'none';
    // 显示学习引导
    showLearningGuide();
  } else {
    codePanel.classList.remove('active');
    topicsSection.style.display = 'block';
    chatInput.placeholder = '输入你的问题... (Enter 发送，Shift+Enter 换行)';
    if (welcomeMsg) welcomeMsg.style.display = '';
    loadTopics('default');
  }
}

// ── Load Topics ───────────────────────────────────────────────────────────────
async function loadTopics(page) {
  try {
    const resp = await fetch(`/ai/suggest_topics?page=${page}`);
    const data = await resp.json();
    if (data.success && data.topics) {
      const grid = document.getElementById('topicsGrid');
      grid.innerHTML = data.topics.map(t =>
        `<button class="topic-btn" onclick="askTopic('${t.replace(/'/g, "\\'")}')">${t}</button>`
      ).join('');
    }
  } catch(e) {
    document.getElementById('topicsGrid').innerHTML = `
      <button class="topic-btn" onclick="askTopic('什么是人工智能？')">什么是人工智能？</button>
      <button class="topic-btn" onclick="askTopic('表情识别是怎么工作的？')">表情识别是怎么工作的？</button>
      <button class="topic-btn" onclick="askTopic('时序预测是什么？')">时序预测是什么？</button>
    `;
  }
}

function askTopic(question) {
  document.getElementById('chatInput').value = question;
  sendMessage();
}

// ── Learning Guide ────────────────────────────────────────────────────────────
function showLearningGuide() {
  const chatArea = document.getElementById('chatArea');

  // 清除欢迎消息
  const welcome = document.getElementById('welcomeMsg');
  if (welcome) welcome.style.display = 'none';

  // 添加引导卡片
  const guideHtml = `
    <div class="guide-card" style="margin-bottom:1rem">
      <div class="guide-card-title">📚 学习引导 — 选择课程和课时</div>
      <div class="guide-select-row">
        <select class="guide-select" id="guideCourse" onchange="updateGuide()">
          <option value="">请选择课程</option>
          <option value="emotion">情感计算课程</option>
          <option value="ecobottle">生态瓶时序课程</option>
        </select>
        <select class="guide-select" id="guideLesson" onchange="updateGuide()">
          <option value="">请选择课时</option>
          <option value="1">第1课</option>
          <option value="2">第2课</option>
          <option value="3">第3课</option>
          <option value="4">第4课</option>
        </select>
      </div>
      <div id="guideResult" style="color:#c4b5fd;font-size:0.88rem"></div>
    </div>
  `;

  // 移除旧的引导卡片
  const old = document.getElementById('guideCard');
  if (old) old.remove();

  chatArea.insertAdjacentHTML('beforeend', `<div id="guideCard">${guideHtml}</div>`);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function updateGuide() {
  const course = document.getElementById('guideCourse').value;
  const lesson = document.getElementById('guideLesson').value;
  const result = document.getElementById('guideResult');
  if (!course || !lesson) return;
  result.textContent = '正在加载...';
  fetch(`/ai/guide?course=${course}&lesson=${lesson}`)
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        result.textContent = data.guide;
      }
    });
}

// ── Send Message ───────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';

  // 隐藏欢迎消息
  const welcome = document.getElementById('welcomeMsg');
  if (welcome) welcome.style.display = 'none';

  // 移除学习引导卡片
  const guideCard = document.getElementById('guideCard');
  if (guideCard) guideCard.remove();

  // 添加用户消息
  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // 添加 AI 思考中
  const thinkingId = appendThinking();

  try {
    const resp = await fetch('/ai/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text })
    });
    const data = await resp.json();

    removeThinking(thinkingId);

    if (data.success) {
      appendMessage('ai', data.answer, data.source);
      document.getElementById('sourceBadge').textContent = data.source;
    } else {
      appendMessage('ai', '抱歉，出错了：' + (data.error || '未知错误'), 'error');
    }
  } catch(e) {
    removeThinking(thinkingId);
    appendMessage('ai', '网络连接失败，请检查网络后重试 🐱', 'error');
  }

  isLoading = false;
  sendBtn.disabled = false;
  sendBtn.textContent = '➤';
}

// ── Code Review ────────────────────────────────────────────────────────────────
async function submitCodeReview() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { alert('请先粘贴代码'); return; }

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳';
  isLoading = true;

  appendMessage('user', '🔍 请审查以下代码：\n```python\n' + code + '\n```');
  const thinkingId = appendThinking();

  try {
    const resp = await fetch('/ai/code_review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, language: 'python' })
    });
    const data = await resp.json();
    removeThinking(thinkingId);
    if (data.success) {
      let feedback = data.feedback || '审查完成 👍';
      if (data.issues && data.issues.length > 0) {
        feedback += '\n\n**发现的问题：**\n' + data.issues.map(i => '• ' + i).join('\n');
      }
      if (data.suggestions && data.suggestions.length > 0) {
        feedback += '\n\n**改进建议：**\n' + data.suggestions.map(s => '• ' + s).join('\n');
      }
      appendMessage('ai', feedback, data.source);
    } else {
      appendMessage('ai', '审查失败：' + (data.error || '未知错误'), 'error');
    }
  } catch(e) {
    removeThinking(thinkingId);
    appendMessage('ai', '网络连接失败 🐱', 'error');
  }

  isLoading = false;
  sendBtn.disabled = false;
  sendBtn.textContent = '➤';
}

// ── UI Helpers ───────────────────────────────────────────────────────────────
function appendMessage(type, content, source) {
  const area = document.getElementById('chatArea');
  const avatar = type === 'ai' ? '🤖' : '😊';
  const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

  // 简单 Markdown 渲染
  const html = renderMarkdown(content);

  area.insertAdjacentHTML('beforeend', `
    <div class="msg-wrap ${type}">
      <div class="msg-avatar ${type}">${avatar}</div>
      <div>
        <div class="msg-content">${html}</div>
        <div class="msg-time">${now}</div>
      </div>
    </div>
  `);
  area.scrollTop = area.scrollHeight;
}

function appendThinking() {
  const id = 'thinking-' + Date.now();
  const area = document.getElementById('chatArea');
  area.insertAdjacentHTML('beforeend', `
    <div class="msg-wrap ai" id="${id}">
      <div class="msg-avatar thinking">🤖</div>
      <div>
        <div class="msg-content" style="padding:0.5rem 1rem">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
  `);
  area.scrollTop = area.scrollHeight;
  return id;
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/```python\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/```\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
